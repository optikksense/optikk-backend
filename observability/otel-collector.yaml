# OpenTelemetry Collector config — forwards self-telemetry to Grafana Cloud.
#
# Backend SDK ─OTLP gRPC :4317──┐
# Browser ─OTLP HTTP :4318──────┤
#                               └─► Grafana Cloud OTLP gateway
#                                   (traces, logs, metrics — one endpoint)
#
# Credentials come from docker-compose env (see .env / .env.example):
#   GRAFANA_CLOUD_OTLP_ENDPOINT
#   GRAFANA_CLOUD_OTLP_AUTH
# The collector expands ${ENV:-default} at start; a missing var fails fast.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        # Browser OTLP needs CORS — otherwise the preflight from the FE
        # origin (5173 / 3000) is rejected.
        cors:
          allowed_origins:
            - "http://localhost:3000"
            - "http://localhost:5173"
          allowed_headers:
            - "*"
  # Scrape Go runtime metrics from the backend /metrics endpoint so
  # Grafana Cloud gets RED + runtime panels without a separate Prometheus.
  prometheus:
    config:
      scrape_configs:
        - job_name: optikk-api
          scrape_interval: 15s
          metrics_path: /metrics
          static_configs:
            - targets: ["host.docker.internal:19090"]

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 20
  batch:
    timeout: 2s
    send_batch_size: 1024
    send_batch_max_size: 2048
  batch/metrics:
    timeout: 30s
    send_batch_size: 1024
    send_batch_max_size: 2048
  # Grafana Cloud requires a `service.name` attribute; stamp a sensible
  # default for anything that arrives without one (notably browser spans).
  resource/defaults:
    attributes:
      - key: service.namespace
        value: optikk
        action: upsert

exporters:
  otlphttp/grafana-cloud:
    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:GRAFANA_CLOUD_OTLP_AUTH}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/defaults, batch]
      exporters: [otlphttp/grafana-cloud]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/defaults, batch]
      exporters: [otlphttp/grafana-cloud]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resource/defaults, batch/metrics]
      exporters: [otlphttp/grafana-cloud]
  telemetry:
    logs:
      level: info
    metrics:
      level: none
