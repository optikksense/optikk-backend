# Branch protection (main): require status check "Build and Test / build".
name: Build and Test

on:
  push:
    branches: [main, CodeRefarctor]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Sync go.work
        run: go work use

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./cmd/server
