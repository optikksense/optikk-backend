# Publishes only on push to main or manual dispatch from main (not on pull_request).
name: Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-push:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute version
        id: version
        run: |
          BASE="1.0"
          RUN="${{ github.run_number }}"
          echo "value=v${BASE}.${RUN}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          docker build -t ghcr.io/optikk-org/optikk-lens:latest \
                       -t ghcr.io/optikk-org/optikk-lens:${{ steps.version.outputs.value }} .
          docker push ghcr.io/optikk-org/optikk-lens:latest
          docker push ghcr.io/optikk-org/optikk-lens:${{ steps.version.outputs.value }}
