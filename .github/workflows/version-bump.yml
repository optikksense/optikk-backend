name: Version Bump

# After a PR merges to main, cut a new `vX.Y.Z` git tag (patch-bumped
# from the latest existing tag, or from VERSION on first run). Does
# NOT push commits to main, so it is compatible with branch-protection
# rules that require changes go through a pull request.
#
# The tag push triggers deploy.yml, which reads the version from the
# tag name (see deploy.yml's "Resolve image version" step). VERSION
# stays in the repo as a human-readable reference that can be updated
# manually on a PR when major/minor bumps are needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bump:
    name: Bump patch
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip bump]') }}
    permissions:
      contents: write
    steps:
      - name: Checkout main (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          CURRENT_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          if [[ -n "${CURRENT_TAG}" ]]; then
            CURRENT="${CURRENT_TAG#v}"
          elif [[ -f VERSION ]]; then
            CURRENT="$(tr -d '[:space:]' < VERSION)"
          else
            echo "::error::No existing tag and no VERSION file to seed from."
            exit 1
          fi
          if [[ ! "$CURRENT" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Version must be MAJOR.MINOR.PATCH, got: '$CURRENT'"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          TAG="v${NEW}"
          echo "previous=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "next=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create + push tag
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          PREVIOUS: ${{ steps.bump.outputs.previous }}
          NEXT: ${{ steps.bump.outputs.next }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::warning::Tag ${TAG} already exists; nothing to do."
            exit 0
          fi
          SHORT_SHA="${TRIGGER_SHA:0:7}"
          git tag -a "${TAG}" \
            -m "${TAG}" \
            -m "Bumped ${PREVIOUS} → ${NEXT} after ${SHORT_SHA} landed on main."
          git push origin "${TAG}"
