syntax = "proto3";

package optikk.ingest.metrics.v1;

option go_package = "github.com/Optikk-Org/optikk-backend/internal/ingestion/metrics/schema;schema";

// Row is the wire format on Kafka. One record == one metric data point bound
// for observability.metrics. Field order mirrors the ClickHouse column order
// in row.go Columns.
message Row {
  uint32 team_id = 1;
  string env = 2;
  string metric_name = 3;
  string metric_type = 4;           // Gauge | Sum | Histogram
  string temporality = 5;           // Unspecified | Delta | Cumulative
  bool   is_monotonic = 6;
  string unit = 7;
  string description = 8;
  uint64 resource_fingerprint = 9;
  int64  timestamp_ns = 10;
  double value = 11;
  double hist_sum = 12;
  uint64 hist_count = 13;
  repeated double hist_buckets = 14;
  repeated uint64 hist_counts = 15;
  map<string, string> attributes = 16;
}
