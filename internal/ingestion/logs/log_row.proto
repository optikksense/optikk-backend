syntax = "proto3";

package optikk.ingest.logs.v1;

option go_package = "github.com/Optikk-Org/optikk-backend/internal/ingestion/logs;logs";

// Row is the wire format on Kafka. One record == one log row bound for
// observability.logs. The field order mirrors the ClickHouse column order
// declared in row.go Columns so the consumer can build positional CH values
// without a lookup map. The legacy `scope_string` field was removed in the
// ingest rewrite — it duplicated `scope_name` and added no query value.
message Row {
  uint32 team_id = 1;
  uint32 ts_bucket_start = 2;
  int64 timestamp_ns = 3;           // time.Time at CH boundary
  uint64 observed_timestamp_ns = 4;
  string trace_id = 5;
  string span_id = 6;
  uint32 trace_flags = 7;
  string severity_text = 8;
  uint32 severity_number = 9;       // uint8 at CH; narrow at boundary
  string body = 10;
  map<string, string> attributes_string = 11;
  map<string, double> attributes_number = 12;
  map<string, bool>   attributes_bool = 13;
  map<string, string> resource = 14;
  string resource_fingerprint = 15;
  string scope_name = 16;
  string scope_version = 17;
  // field 18 (scope_string) intentionally retired.
}
