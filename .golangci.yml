version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck          # unchecked errors
    - govet             # go vet passes
    - staticcheck       # advanced static analysis
    - unused            # dead code
    - ineffassign       # useless assignments
    - gosec             # security checks
    - gocritic          # bug/perf/style diagnostics
    - revive            # fast superset of golint

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*go.uber.org/zap.Logger).Sync

    gocritic:
      enabled-checks:
        - dupImport
        - nestingReduce
        - builtinShadow

    gosec:
      excludes:
        - G104

    staticcheck:
      checks:
        - all
        - "-ST1000"
        - "-ST1003"
        - "-QF1001"

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: if-return
        - name: increment-decrement
        - name: var-naming
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
          disabled: true
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
          disabled: true
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - path: internal/migrate/
        linters:
          - errcheck
    presets:
      - comments
      - std-error-handling

formatters:
  enable:
    - goimports
