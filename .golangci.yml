run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosec
    - bodyclose
    - gocritic
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
  gocritic:
    enabled-checks:
      - dupImport
      - ifElseChain
      - nestingReduce
      - unnecessaryBlock
  gosec:
    excludes:
      - G104 # unhandled errors on deferred Close — too noisy

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
  max-issues-per-linter: 50
  max-same-issues: 5
