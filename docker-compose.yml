services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: observability
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  mariadb:
    image: mariadb:latest
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: observability
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # OTLP ingest queue (Kafka/Redpanda; API must use kafka.broker_list reachable from the host, e.g. localhost:19092).
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.11
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --smp
      - "1"
      - --memory
      - 1G
      - --mode
      - dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  # Metrics scrape + optional remote_write to Grafana Cloud / Datadog / etc.
  # See docs/observability.md for external-backend wiring.
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      # Makes `host.docker.internal` resolvable on Linux; no-op on macOS/Windows.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  clickhouse_data:
  mariadb_data:
  redis_data:
  redpanda_data:
  prometheus_data: