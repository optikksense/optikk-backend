services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_DB: observability
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  mariadb:
    image: mariadb:latest
    ports:
      - "13306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: observability
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

  # RESP-compatible drop-in for Redis. App still binds via the `redis` config
  # block (host port 16379) — the Go client speaks RESP, no code change needed.
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    ports:
      - "16379:6379"
    ulimits:
      memlock: -1
    volumes:
      - dragonfly_data:/data
    # Dragonfly's image ships no redis-cli or wget; use a TCP-open probe via
    # the bash builtin /dev/tcp.
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6379' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10


volumes:
  clickhouse_data:
  mariadb_data:
  dragonfly_data:

