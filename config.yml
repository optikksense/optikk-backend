environment: development

server:
  port: "19090"
  allowed_origins: "http://localhost:3000,http://localhost:5173"

mysql:
  host: "127.0.0.1"
  port: "13306"
  database: observability
  user: root
  password: root123
  max_open_conns: 50
  max_idle_conns: 25

clickhouse:
  host: "127.0.0.1"
  port: "19000"
  database: observability
  user: default
  password: clickhouse123
  secure: false

session:
  lifetime_ms: 86400000
  idle_timeout_ms: 7200000
  cookie_name: optikk_session
  cookie_domain: ""
  cookie_path: "/"
  cookie_secure: false
  cookie_http_only: true
  cookie_same_site: lax

redis:
  enabled: true
  host: "127.0.0.1"
  port: "16379"
  password: ""
  db: 0

otlp:
  grpc_port: "4317"

retention:
  default_days: 30

ingestion:
  spans:
    partitions: 8
    replicas: 1
    retention_hours: 24
  logs:
    partitions: 8
    replicas: 1
    retention_hours: 24
  metrics:
    partitions: 8
    replicas: 1
    retention_hours: 24

kafka:
  broker_list: "127.0.0.1:19092"
  topic_prefix: optikk.ingest
  dlq_prefix: optikk.dlq
  compression: zstd
  linger_ms: 20
  batch_max_bytes: 1048576

