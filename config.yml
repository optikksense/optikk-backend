environment: development

server:
  port: "19090"
  allowed_origins: "http://localhost:3000,http://localhost:5173"
  debug_api_logs: false

mysql:
  host: "127.0.0.1"
  port: "13306"
  database: observability
  user: root
  password: root123
  max_open_conns: 50
  max_idle_conns: 25

clickhouse:
  host: "127.0.0.1"
  port: "19000"
  database: observability
  user: default
  password: clickhouse123
  secure: false

session:
  lifetime_ms: 86400000
  idle_timeout_ms: 7200000
  cookie_name: optikk_session
  cookie_domain: ""
  cookie_path: "/"
  cookie_secure: false
  cookie_http_only: true
  cookie_same_site: lax

redis:
  enabled: true
  host: "127.0.0.1"
  port: "16379"
  password: ""
  db: 0

otlp:
  grpc_port: "4317"

retention:
  default_days: 30

# Per-signal Kafka topology. Topic names derive from kafka.topic_prefix +
# signal (e.g. optikk.ingest.spans); DLQ from kafka.dlq_prefix + signal.
# Zero values inherit defaults: 8 partitions, 1 replica (dev) / 3 (prod),
# 24h retention, consumer_group "optikk-ingest.{signal}.consumer".
ingestion:
  spans:
    partitions: 8
    replicas: 1
    retention_hours: 24
  logs:
    partitions: 8
    replicas: 1
    retention_hours: 24
  metrics:
    partitions: 8
    replicas: 1
    retention_hours: 24

# OTLP ingest uses Kafka. Brokers must be reachable from this process
# (e.g. host port when API runs on host). Topic auto-creation is handled at
# boot via kadm.CreateTopics; broker need not have auto.create.topics.enable.
kafka:
  broker_list: "127.0.0.1:19092" # or OPTIKK_KAFKA_BROKER_LIST
  topic_prefix: optikk.ingest    # ingest topics: {prefix}.{spans|logs|metrics}
  dlq_prefix: optikk.dlq         # DLQ topics:    {dlq_prefix}.{spans|logs|metrics}
  compression: zstd
  linger_ms: 20
  batch_max_bytes: 1048576       # 1 MiB

app:
  region: us-east-1

# Self-telemetry: Prometheus metrics are exposed on /metrics and scraped by
# the local Prometheus+Grafana stack (monitoring/stack/).
