environment: development

server:
  port: "19090"
  allowed_origins: "http://localhost:3000,http://localhost:5173"
  debug_api_logs: false

mysql:
  host: "127.0.0.1"
  port: "13306"
  database: observability
  user: root
  password: root123
  max_open_conns: 50
  max_idle_conns: 25

clickhouse:
  host: "127.0.0.1"
  port: "19000"
  database: observability
  user: default
  password: clickhouse123
  secure: false
  auto_migrate: true

session:
  lifetime_ms: 86400000
  idle_timeout_ms: 7200000
  cookie_name: optikk_session
  cookie_domain: ""
  cookie_path: "/"
  cookie_secure: false
  cookie_http_only: true
  cookie_same_site: lax

redis:
  enabled: true
  host: "127.0.0.1"
  port: "16379"
  password: ""
  db: 0

otlp:
  grpc_port: "4317"

retention:
  default_days: 30

ingestion:
  byte_tracker_flush_interval_ms: 300000 # 5 minutes

# OTLP ingest uses Kafka. Brokers must be reachable from this process (e.g. host port when API runs on host).
kafka:
  broker_list: "127.0.0.1:19092" # or OPTIKK_KAFKA_BROKER_LIST; docker-compose kafka external port
  consumer_group: optikk-ingest # optional; default optikk-ingest
  topic_prefix: optikk.ingest # optional; topics: {prefix}.logs|.spans|.metrics
  replication_factor: 1

app:
  region: us-east-1

# Self-telemetry to the LGTM monitoring stack. Intentionally NOT routed
# through this process's own OTLP receiver on :4317 — see
# internal/infra/otel/provider.go doc for why.
telemetry:
  otel:
    enabled: true
    endpoint: "127.0.0.1:14317"
    sample_ratio: 1.0
    service_name: optikk-backend
